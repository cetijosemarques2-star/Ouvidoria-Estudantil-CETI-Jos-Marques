<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI José Marques</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png">
  <h2>Ouvidoria CETI</h2>
</header>

<!-- INÍCIO -->
<div id="inicio" class="section active">
  <div class="card">
    <h3>Bem-vindo 👋</h3>
    <p>Seu espaço para melhorar a escola.</p>
  </div>
</div>

<!-- FORMULÁRIO -->
<div id="formulario" class="section">

  <form action="https://formsubmit.co/cetijosemarques2@gmail.com" method="POST">

    <div class="card">
      <h3>📋 Feedback Escolar</h3>
    </div>

    <div class="card">
      <p>O ambiente é limpo?</p>
      <label><input type="radio" name="Limpeza" value="Sim"> Sim</label>
      <label><input type="radio" name="Limpeza" value="Não"> Não</label>

      <p>Banheiros em boas condições?</p>
      <label><input type="radio" name="Banheiros" value="Sim"> Sim</label>
      <label><input type="radio" name="Banheiros" value="Não"> Não</label>

      <p>Salas confortáveis?</p>
      <label><input type="radio" name="Salas" value="Sim"> Sim</label>
      <label><input type="radio" name="Salas" value="Não"> Não</label>

      <p>Comentário:</p>
      <textarea name="Comentario"></textarea>

      <button type="submit">Enviar</button>
    </div>

  </form>

</div>

<!-- CHAT -->
<div id="chat" class="section">

  <div class="topo-chat">
    <img src="logo.png">
    <h3>CETI José Marques</h3>
  </div>

  <div class="chat-area" id="chatBox"></div>

  <div class="chat-input">
    <input type="text" id="msg" placeholder="Escreva algo...">
    <button onclick="enviarMsg()">Enviar</button>
  </div>

</div>

<!-- MENU -->
<div class="navbar">
  <button onclick="abrir('inicio')">🏠</button>
  <button onclick="abrir('formulario')">📝</button>
  <button onclick="abrir('chat')">💬</button>
</div>

</body>

<script src="script.js"></script>
</html>
