<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI José Marques</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png">
  <h2>Ouvidoria CETI</h2>
</header>

<!-- INÍCIO -->
<div id="inicio" class="section active">
  <div class="card">
    <h3>Bem-vindo 👋</h3>
    <p>Seu espaço para melhorar a escola.</p>
  </div>
</div>

<!-- FORMULÁRIO -->
<div id="formulario" class="section">
  <div class="card">
    <h3>Questionário</h3>

    <p>Você gosta da escola?</p>
    <input type="radio" name="q1"> Sim
    <input type="radio" name="q1"> Não

    <p>Comentário:</p>
    <textarea id="comentario"></textarea>

    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="card">
    <h3>Chat</h3>

    <div class="chat-box" id="chatBox"></div>

    <input type="text" id="msg" placeholder="Digite uma mensagem">
    <button onclick="enviarMsg()">Enviar</button>
  </div>
</div>

<!-- MENU INFERIOR (ESTILO APP) -->
<div class="navbar">
  <button onclick="abrir('inicio')">🏠</button>
  <button onclick="abrir('formulario')">📝</button>
  <button onclick="abrir('chat')">💬</button>
</div>

<script src="script.js"></script>

</body>
</html>
