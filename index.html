<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI José Marques</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
  transition: 0.3s;
}

.dark {
  background: #121212;
  color: white;
}

/* TOPO */
header {
  background: linear-gradient(90deg, #2e7d32, #4a148c);
  color: white;
  text-align: center;
  padding: 15px;
}

header img {
  width: 60px;
}

/* SEÇÕES */
.section {
  display: none;
  padding: 15px;
  padding-bottom: 100px;
  animation: fade 0.3s;
}

.active {
  display: block;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1;}
}

/* CARDS */
.card {
  background: white;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.dark .card {
  background: #1e1e1e;
}

/* RADIO */
label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

/* BOTÃO */
button {
  background: #4a148c;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
}

/* MENU */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  border-top: 1px solid #ccc;
}

.navbar button {
  flex: 1;
  background: none;
  color: #333;
}

.navbar button.active {
  color: #4a148c;
  transform: scale(1.2);
}

/* CHAT */
.chat-area {
  height: 300px;
  overflow-y: auto;
  background: #e5e5e5;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.dark .chat-area {
  background: #2c2c2c;
}

.chat-input {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* DARK BUTTON */
.dark-toggle {
  position: fixed;
  bottom: 80px;
  right: 15px;
  border-radius: 50%;
  width: 50px;
  height: 50px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h2>CETI José Marques</h2>
</header>

<!-- INICIO -->
<div id="inicio" class="section active">
  <div class="card">
    <h3>📢 Mural de Avisos</h3>
    <p>Atualizações da escola</p>
  </div>

  <div class="card">
    <h4>🏆 Olimpíadas</h4>
    <p>Inscrições abertas</p>
  </div>

  <div class="card">
    <h4>📅 Cronograma</h4>
    <p>Provas dia 10</p>
  </div>
</div>

<https://formsubmit.co/cetijosemarques2@gmail.com

</form>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="card">
    <h3>💬 Chat</h3>
    <div id="chatBox" class="chat-area"></div>

    <div class="chat-input">
      <input type="text" id="msg">
      <button onclick="enviarMsg()">Enviar</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="navbar">
  <button onclick="abrir('inicio', this)">🏠</button>
  <button onclick="abrir('formulario', this)">📝</button>
  <button onclick="abrir('chat', this)">💬</button>
</div>

<button class="dark-toggle" onclick="toggleDark()">🌙</button>

<script>
function abrir(secao, botao) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(secao).classList.add("active");

  document.querySelectorAll(".navbar button").forEach(b => b.classList.remove("active"));
  if(botao) botao.classList.add("active");
}

function enviarMsg() {
  let input = document.getElementById("msg");
  let chat = document.getElementById("chatBox");

  if(input.value.trim() === "") return;

  let msg = document.createElement("div");
  msg.style.alignSelf = "flex-end";
  msg.style.background = "linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045)";
  msg.style.color = "white";
  msg.style.padding = "10px";
  msg.style.borderRadius = "20px";
  msg.style.margin = "5px";
  msg.innerText = "Anônimo: " + input.value;

  chat.appendChild(msg);
  input.value = "";
}

function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
