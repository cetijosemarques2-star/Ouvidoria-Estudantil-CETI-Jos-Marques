<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO COM ABAS -->
<div class="topbar">
  <div class="tabs">
    <button onclick="abrir('chat', this)" class="tab active">💬 Chat</button>
    <button onclick="abrir('inicio', this)" class="tab">💡 Mural</button>
    <button onclick="abrir('formulario', this)" class="tab">📋 Formulário</button>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <img src="logo.png">
  <h2>CETI José Marques</h2>
</header>

<!-- MURAL -->
<div id="inicio" class="section">
  <div class="card">
    <h3>📢 Avisos</h3>
    <p>Aqui ficam os avisos da escola.</p>
  </div>
</div>

<!-- FORM -->
<div id="formulario" class="section">
  <div class="card">
    <h3>📋 Feedback</h3>
    <textarea placeholder="Digite sua opinião..."></textarea>
    <button>Enviar</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="section active">

  <div class="chat-box" id="chatBox"></div>

  <div class="chat-input">
    <input type="text" id="msg" placeholder="Escreva algo...">
    <button onclick="enviarMsg()">Enviar</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
