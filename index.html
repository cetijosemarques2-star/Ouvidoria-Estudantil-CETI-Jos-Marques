<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI José Marques</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

header {
  background: linear-gradient(90deg, #2e7d32, #4a148c);
  color: white;
  text-align: center;
  padding: 15px;
}

header img {
  width: 60px;
}

.section {
  display: none;
  padding: 15px;
  padding-bottom: 100px;
}

.active {
  display: block;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

input[type="radio"] {
  transform: scale(1.2);
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #4a148c;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  width: 100%;
}

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ccc;
}

.chat-area {
  height: 300px;
  overflow-y: auto;
  background: #e5e5e5;
  padding: 10px;
}

.chat-input {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <img src="logo.png">
  <h2>Ouvidoria CETI</h2>
</header>

<div id="inicio" class="section active">
  <div class="card">
    <h3>Bem-vindo 👋</h3>
  </div>
</div>

<div id="formulario" class="section">

<form action="https://formsubmit.co/cetijosemarques2@gmail.com" method="POST">

<div class="card">
<h3>📋 Feedback Escolar</h3>
</div>

<div class="card">
<h4>🏫 Estrutura</h4>
<p>Ambiente limpo?</p>
<label><input type="radio" name="q1"> Sim</label>
<label><input type="radio" name="q1"> Não</label>
</div>

<div class="card">
<h4>📚 Ensino</h4>
<p>Entende o conteúdo?</p>
<label><input type="radio" name="q2"> Sim</label>
<label><input type="radio" name="q2"> Não</label>
</div>

<div class="card">
<h4>📊 Avaliação</h4>
<label><input type="radio" name="q3"> Ótima</label>
<label><input type="radio" name="q3"> Boa</label>
<label><input type="radio" name="q3"> Regular</label>
<label><input type="radio" name="q3"> Ruim</label>
</div>

<div class="card">
<textarea name="comentario" placeholder="Sugestão..."></textarea>
<button type="submit">Enviar</button>
</div>

</form>

</div>

<div id="chat" class="section">
  <div class="card">
    <h3>Chat</h3>
    <div id="chatBox" class="chat-area"></div>

    <div class="chat-input">
      <input type="text" id="msg">
      <button onclick="enviarMsg()">Enviar</button>
    </div>
  </div>
</div>

<div class="navbar">
  <button onclick="abrir('inicio')">🏠</button>
  <button onclick="abrir('formulario')">📝</button>
  <button onclick="abrir('chat')">💬</button>
</div>

<script>
function abrir(secao) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(secao).classList.add("active");
}

function enviarMsg() {
  let msg = document.getElementById("msg").value;
  let chat = document.getElementById("chatBox");

  chat.innerHTML += "<p>" + msg + "</p>";
  document.getElementById("msg").value = "";
}
</script>

</body>
</html>
