<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ouvidoria CETI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topbar">
  <div class="tabs">
    <button class="tab active">💬 Chat</button>
    <button class="tab">💡 Mural</button>
    <button class="tab">📢 Alertas</button>
    <button class="tab">🎭 Humor</button>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <img src="logo.png">
  <h2>CETI José Marques</h2>
</header>

<!-- CHAT -->
<div class="chat-container">

  <div id="chatBox" class="chat-box">

    <!-- MENSAGEM ESQUERDA -->
    <div class="msg-row left">
      <span class="user">Aluno</span>
      <div class="msg left">O que é fagu?</div>
    </div>

    <!-- DIREITA -->
    <div class="msg-row right">
      <span class="user">Anônimo</span>
      <div class="msg right">Nem sei também</div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="chat-input">
    <input type="text" id="msg" placeholder="Escreva algo...">
    <button onclick="enviarMsg()">Enviar</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
